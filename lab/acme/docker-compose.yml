services:

# Docker Pebble Lab Environment for Domino V12+ CertMgr local testing
#
# Version: 1.1
#
# V1.0  21.05.2021   Initial version
# V1.1  24.02.2026   Change registry to GitHub and changes for newer parameters
#
# Author : Daniel Nashed
#

  pebble:

    image: ghcr.io/letsencrypt/pebble:latest
    container_name: lab-pebble-ca
    command: -config /pebble-config.json -strict -dnsserver challtestsrv:53

    environment:
      - PEBBLE_VA_NOSLEEP=1
      - PEBBLE_AUTHZREUSE=0
      - PEBBLE_WFE_NONCEREJECT=0

    ports:
      - 14000:14000  # HTTPS ACME API
      - 15000:15000  # HTTPS Management API

    volumes:
      - ./pebble-config.json/:/pebble-config.json
     # - ./certs:/test/certs/localhost
     # Optional if you have your own certificate for the web server.
     # In this case create a cert.pem and key.pem file in the local directory mapped a a volume.

  challtestsrv:

    image: ghcr.io/letsencrypt/pebble-challtestsrv:latest
    container_name: lab-pebble-challtestsrv
    command: -http01 ":80" -https01 ":443" -dnsserver ":53" -doh "" -defaultIPv6 "" -defaultIPv4 "${DOMINO_IP:-127.0.0.1}"

    ports:
      - 8055:8055  # HTTP Management API
